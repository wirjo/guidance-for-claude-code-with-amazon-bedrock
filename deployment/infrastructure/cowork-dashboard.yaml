AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudWatch dashboard for Claude CoWork usage metrics'

Parameters:
  DashboardName:
    Type: String
    Default: ClaudeCoWorkDashboard
    Description: Name for the CloudWatch dashboard

  MetricsLogGroup:
    Type: String
    Default: /aws/claude-code/metrics
    Description: CloudWatch Log Group containing CoWork metrics

  MetricsRegion:
    Type: String
    Default: us-east-1
    Description: Region where metrics log group exists

Resources:
  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Ref DashboardName
      DashboardBody: !Sub |
        {
          "widgets": [

            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 2,
              "properties": {
                "markdown": "# Claude CoWork Dashboard\nUsage and cost metrics for Claude CoWork (Claude Desktop) sessions routed through Amazon Bedrock. User attribution requires the **otel-helper proxy** installed on each device — `install.sh` sets this up automatically.",
                "background": "transparent"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 2, "width": 6, "height": 4,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.session.count` > 0 | stats sum(`claude_code.session.count`) as Sessions",
                "region": "${MetricsRegion}",
                "title": "Total Sessions",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 6, "y": 2, "width": 6, "height": 4,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.token.usage` > 0 | stats sum(`claude_code.token.usage`) as TotalTokens",
                "region": "${MetricsRegion}",
                "title": "Total Tokens Used",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12, "y": 2, "width": 6, "height": 4,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.cost.usage` > 0 | stats sum(`claude_code.cost.usage`) as TotalCost",
                "region": "${MetricsRegion}",
                "title": "Total Cost (USD)",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 18, "y": 2, "width": 6, "height": 4,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.session.count` > 0 | stats count_distinct(`user.email`) as ActiveUsers",
                "region": "${MetricsRegion}",
                "title": "Active Users",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.token.usage` > 0 | stats sum(`claude_code.token.usage`) as Tokens by bin(1h)",
                "region": "${MetricsRegion}",
                "title": "Token Usage Over Time",
                "queryLanguage": "cwli",
                "view": "timeSeries",
                "stacked": false
              }
            },
            {
              "type": "log",
              "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.cost.usage` > 0 | stats sum(`claude_code.cost.usage`) as Cost by bin(1h)",
                "region": "${MetricsRegion}",
                "title": "Cost Over Time (USD)",
                "queryLanguage": "cwli",
                "view": "timeSeries",
                "stacked": false
              }
            },

            {
              "type": "log",
              "x": 0, "y": 12, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.token.usage` > 0 | parse @message /\"model\":\"(?<model>[^\"]+)\"/ | fields bin(1h) as time, if(model like /sonnet-4-5/, `claude_code.token.usage`, 0) as sonnet_4_5, if(model like /opus-4-6/, `claude_code.token.usage`, 0) as opus_4_6, if(model like /sonnet-4-20250514/, `claude_code.token.usage`, 0) as sonnet_4, if(model like /haiku-4-5/, `claude_code.token.usage`, 0) as haiku_4_5 | stats sum(sonnet_4_5) as Sonnet_4_5, sum(opus_4_6) as Opus_4_6, sum(sonnet_4) as Sonnet_4, sum(haiku_4_5) as Haiku_4_5 by time",
                "region": "${MetricsRegion}",
                "title": "Token Usage by Model Over Time",
                "queryLanguage": "cwli",
                "view": "timeSeries",
                "stacked": false
              }
            },
            {
              "type": "log",
              "x": 12, "y": 12, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.session.count` > 0 | stats sum(`claude_code.session.count`) as Sessions by bin(1h)",
                "region": "${MetricsRegion}",
                "title": "Sessions Over Time",
                "queryLanguage": "cwli",
                "view": "timeSeries",
                "stacked": false
              }
            },

            {
              "type": "text",
              "x": 0, "y": 18, "width": 24, "height": 2,
              "properties": {
                "markdown": "## User Activity",
                "background": "transparent"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 20, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.token.usage` > 0 | stats sum(`claude_code.token.usage`) as Tokens, count_distinct(`session.id`) as Sessions by `user.email` | sort Tokens desc | limit 20",
                "region": "${MetricsRegion}",
                "title": "Top Users by Token Usage",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 12, "y": 20, "width": 12, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.cost.usage` > 0 | stats sum(`claude_code.cost.usage`) as Cost, sum(`claude_code.token.usage`) as Tokens by `user.email` | sort Cost desc | limit 20",
                "region": "${MetricsRegion}",
                "title": "Top Users by Cost (USD)",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 26, "width": 24, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.token.usage` > 0 | stats sum(`claude_code.token.usage`) as Tokens, sum(`claude_code.cost.usage`) as Cost, count_distinct(`session.id`) as Sessions by `user.email` | sort Tokens desc | limit 50",
                "region": "${MetricsRegion}",
                "title": "Per-User Usage Summary",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },

            {
              "type": "text",
              "x": 0, "y": 32, "width": 24, "height": 2,
              "properties": {
                "markdown": "## Token & Model Breakdown",
                "background": "transparent"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 34, "width": 8, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.token.usage` > 0 | stats sum(`claude_code.token.usage`) as Tokens by `type` | sort Tokens desc",
                "region": "${MetricsRegion}",
                "title": "Token Usage by Type (input / output / cache)",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 8, "y": 34, "width": 8, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.token.usage` > 0 | parse @message /\"model\":\"(?<model>[^\"]+)\"/ | stats sum(`claude_code.token.usage`) as Tokens by model | sort Tokens desc",
                "region": "${MetricsRegion}",
                "title": "Token Usage by Model",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 16, "y": 34, "width": 8, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.cost.usage` > 0 | parse @message /\"model\":\"(?<model>[^\"]+)\"/ | stats sum(`claude_code.cost.usage`) as Cost by model | sort Cost desc",
                "region": "${MetricsRegion}",
                "title": "Cost by Model (USD)",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },

            {
              "type": "text",
              "x": 0, "y": 40, "width": 24, "height": 2,
              "properties": {
                "markdown": "## Platform & Version",
                "background": "transparent"
              }
            },

            {
              "type": "log",
              "x": 0, "y": 42, "width": 8, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.session.count` > 0 | stats sum(`claude_code.session.count`) as Sessions by `os.type` | sort Sessions desc",
                "region": "${MetricsRegion}",
                "title": "Sessions by OS",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 8, "y": 42, "width": 8, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.session.count` > 0 | stats sum(`claude_code.session.count`) as Sessions, count_distinct(`user.email`) as Users by `service.version` | sort Sessions desc | limit 20",
                "region": "${MetricsRegion}",
                "title": "CoWork Versions in Use",
                "queryLanguage": "cwli",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 16, "y": 42, "width": 8, "height": 6,
              "properties": {
                "query": "SOURCE '${MetricsLogGroup}' | filter `service.name` = \"cowork\" and `claude_code.session.count` > 0 | stats sum(`claude_code.session.count`) as Sessions, count_distinct(`user.email`) as Users by `host.arch` | sort Sessions desc",
                "region": "${MetricsRegion}",
                "title": "Sessions by Architecture",
                "queryLanguage": "cwli",
                "view": "table"
              }
            }

          ]
        }

Outputs:
  DashboardURL:
    Description: Direct URL to the CoWork CloudWatch dashboard
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${DashboardName}'

  LogsInsightsURL:
    Description: URL to CloudWatch Logs Insights
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:logs-insights'

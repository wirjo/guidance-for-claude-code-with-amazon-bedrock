# ABOUTME: OpenTelemetry Collector Builder manifest for a minimal sidecar collector
# ABOUTME: Includes only components needed for: receive OTLP, extract headers, batch, export to CloudWatch OTLP with SigV4
#
# Build: ./ocb --config ocb-manifest.yaml
# Requires: Go 1.23+ and ocb binary from https://github.com/open-telemetry/opentelemetry-collector-releases/releases

dist:
  name: otelcol-claude
  description: Minimal OTEL Collector sidecar for Claude Code monitoring
  output_path: ./build/otelcol
  version: 1.0.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.120.0

processors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/attributesprocessor v0.120.0
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.120.0

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.120.0

extensions:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/extension/sigv4authextension v0.120.0
